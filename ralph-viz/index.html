<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ralph-viz</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>ralph-viz</h1>
        <p>Drill through a Codex run from run-level summary down to event-level payloads.</p>
      </header>

      <section class="toolbar card">
        <label for="runSelect">Run</label>
        <select id="runSelect"></select>
        <button id="refreshRuns">Refresh runs</button>
        <button id="reloadRun">Reload run</button>
      </section>

      <section class="card">
        <h2>Run summary</h2>
        <div id="summary" class="summary"></div>
      </section>

      <section class="card">
        <div class="toolbar">
          <label for="eventFilter">Filter event type</label>
          <input id="eventFilter" placeholder="e.g. item.completed" />
          <span id="eventCount"></span>
        </div>
        <h2>Turn → Event drilldown</h2>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
