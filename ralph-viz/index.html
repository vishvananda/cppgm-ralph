<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ralph Run Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/diff-highlight/prism-diff-highlight.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>Ralph Run Viewer</h1>
        <p>ralph-viz</p>
      </header>

      <section class="toolbar">
        <label for="runSelect">Run</label>
        <select id="runSelect"></select>
        <button id="refreshRuns">Refresh</button>
        <button id="reloadRun">Reload</button>
        <div class="toolbar-sep"></div>
        <label for="viewerMode">View</label>
        <select id="viewerMode">
          <option value="runs" selected>Runs</option>
          <option value="compare">Compare</option>
        </select>
        <div class="toolbar-sep"></div>
        <label for="codexDetail">Detail</label>
        <select id="codexDetail">
          <option value="tail:2" selected>Last 2 turns</option>
          <option value="tail:5">Last 5 turns</option>
          <option value="open">Open turns</option>
          <option value="none">Ralph only</option>
          <option value="all">All detail (slow)</option>
        </select>
        <div class="toolbar-sep"></div>
        <input id="eventFilter" placeholder="filter events..." style="width:140px" />
        <span id="eventCount" class="muted" style="font-size:0.75rem"></span>
        <div class="toolbar-sep"></div>
        <label class="toggle-label hide-noise-toggle"><input type="checkbox" id="hideNoise" checked /> Hide noise</label>
        <label class="toggle-label auto-refresh-toggle"><input type="checkbox" id="autoRefresh" checked /> Auto-refresh</label>
        <label class="toggle-label combined-view-toggle"><input type="checkbox" id="combinedView" checked /> Combined</label>
        <label class="toggle-label full-view-toggle"><input type="checkbox" id="fullView" /> Full view</label>
      </section>

      <section class="card summary-card">
        <h2 id="summaryTitle">Summary</h2>
        <div id="summary" class="summary"></div>
      </section>

      <section id="runDocsCard" class="card run-docs-card" hidden>
        <h2>Run Config And Prompts</h2>
        <div id="runDocs" class="run-docs"></div>
      </section>

      <section class="card timeline-card">
        <h2 id="timelineTitle">Turns</h2>
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <div id="progressDock" class="progress-dock" aria-live="polite"></div>
    <script>window.Prism = window.Prism || {}; window.Prism.manual = true;</script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-clike.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-diff.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/diff-highlight/prism-diff-highlight.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
